<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROLE CARD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#1f2b4d,#090909);

overflow:hidden;

}

.container{

text-align:center;

}

h1{

color:white;
letter-spacing:6px;
margin-bottom:40px;
font-size:40px;
text-shadow:0 0 20px cyan;

}

button{

padding:18px 45px;
font-size:22px;
border:none;
border-radius:50px;
cursor:pointer;

background:linear-gradient(45deg,#1f9dff,#4fd6ff);

color:white;

transition:.3s;

box-shadow:
0 0 20px #38bdf8;

}

button:hover{

transform:scale(1.08);

box-shadow:
0 0 40px #38bdf8;

}

.card{

margin-top:45px;

display:none;

animation:open 1s forwards;

}

.card img{

width:320px;

border-radius:18px;

border:4px solid gold;

box-shadow:

0 0 20px gold,
0 0 60px gold,
0 0 120px rgba(255,215,0,.7);

}

.role{

margin-top:25px;

font-size:38px;

color:white;

letter-spacing:4px;

text-shadow:
0 0 10px cyan,
0 0 30px cyan;

}

@keyframes open{

0%{

opacity:0;

transform:

rotateY(180deg)
scale(.3);

}

70%{

transform:

rotateY(0deg)
scale(1.08);

}

100%{

opacity:1;

transform:scale(1);

}

}

.magic{

position:fixed;

width:12px;

height:12px;

background:white;

border-radius:50%;

animation:float 6s linear infinite;

opacity:.6;

}

@keyframes float{

0%{

transform:translateY(100vh);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120vh);

opacity:0;

}

}

</style>

</head>

<body>

<div class="container">

<h1>ROLE CARD</h1>

<button onclick="openCard()">
役職を受け取る
</button>

<div class="card" id="card">

<img src="IMG_3572.jpg">

<div class="role">

藁人形

</div>

</div>

</div>

<script>

for(let i=0;i<40;i++){

let s=document.createElement("div");

s.className="magic";

s.style.left=Math.random()*100+"vw";

s.style.animationDelay=Math.random()*6+"s";

s.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(s);

}

function openCard(){

document.querySelector("button").style.display="none";

document.getElementById("card").style.display="block";

}

</script>

</body>

</html>
